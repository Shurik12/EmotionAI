services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: dragonfly
    ports:
      - "6379:6379"
    volumes:
      - ./data/dragonfly:/data
    command:
      - "--memcached_port=0" # Disable memcached protocol if not needed
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO S3 Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console port
    volumes:
      - ./data/minio:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create bucket on startup
  minio-create-buckets:
    image: minio/mc:latest
    container_name: minio-create-buckets
    depends_on:
      - minio
    entrypoint: |
      sh -c "
      until mc alias set emotionai http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...'
        sleep 5
      done
      mc mb emotionai/emotionai --ignore-existing
      mc anonymous set public emotionai/emotionai
      echo 'MinIO bucket created and configured'
      "
    networks:
      - monitoring

  emotionai-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: emotionai-server:latest
    container_name: emotionai-server
    ports:
      - "8080:8080" # Main application port
      - "8081:8081" # Metrics endpoint port
    volumes:
      - ./logs:/emotionai/logs
      - ./uploads:/emotionai/uploads
      - ./results:/emotionai/results
      - ./frontend/build:/emotionai/frontend
      - ./config.yaml:/emotionai/config.yaml
      - ./build/emotionai:/emotionai/emotionai
    environment:
      - LOG_LEVEL=info
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      # S3 Configuration
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=emotionai
      - S3_USE_SSL=false
    networks:
      - monitoring
    depends_on:
      dragonfly:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - cadvisor
      - emotionai-server

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  dragonfly_data:
  minio_data:  # Added MinIO volume


networks:
  monitoring:
    driver: bridge